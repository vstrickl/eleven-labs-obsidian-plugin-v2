# yaml-language-server: $schema=./schema.json
threagile_version: 1.0.0

title: Obsidian TTS

date: 2026-03-07

author:
  name: vonst
  homepage: ""

management_summary_comment: >
  Threat model for an Obsidian TypeScript plugin that sends selected note text to ElevenLabs API and writes generated MP3 files into the vault.

business_criticality: important # values: archive, operational, important, critical, mission-critical

business_overview:
  description: >
    The plugin converts user-selected text from notes into audio using ElevenLabs and stores resulting MP3 files in the local vault.
  images:

technical_overview:
  description: >
    Main flow: Obsidian user -> plugin runtime -> ElevenLabs API (HTTPS) -> plugin writes MP3 to local vault.
  images:

questions: # simply use "" as answer to signal "unanswered"
  How are user endpoints managed/protected against compromise?: ""
  How are plugin logs protected from secret leakage?: ""
  How is plugin setting storage (including API key) hardened?: ""

abuse_cases:
  API Key Theft: >
    As an attacker I want to obtain the ElevenLabs API key from local settings or logs to abuse the account.
  Vault Path Traversal: >
    As an attacker I want to control output paths and overwrite unintended files in the vault.
  Sensitive Data Exfiltration: >
    As an attacker I want to exfiltrate sensitive note content via API requests or generated artifacts.

security_requirements:
  Protect Secrets at Rest: API keys must not be stored in plaintext without compensating controls.
  Input and Path Validation: Output paths and filenames must be validated and normalized.
  Secret-Safe Logging: Logging must redact secrets and sensitive request metadata.

tags_available:
  - obsidian
  - elevenlabs
  - plugin
  - typescript
  - desktop
  - vault

