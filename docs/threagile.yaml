individual_risk_categories:

  T1 API Key Plaintext in data.json:
    id: t1-api-key-plaintext-data-json
    description: API key is stored unencrypted in Obsidian plugin settings (`data.json`).
    impact: Theft of API key can enable unauthorized API usage, billing abuse, and lateral misuse.
    asvs: V6 - Stored Cryptography
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    action: Avoid plaintext secret persistence; use OS keychain or encrypted-at-rest storage with access controls.
    mitigation: Migrate API key storage from `data.json` to keychain-backed storage and scrub legacy values.
    check: Verify no plaintext API key remains in vault `.obsidian/plugins/*/data.json` files.
    function: architecture # values: business-side, architecture, development, operations
    stride: information-disclosure # values: spoofing, tampering, repudiation, information-disclosure, denial-of-service, elevation-of-privilege
    detection_logic: Search local plugin settings for key patterns and verify keychain integration paths.
    risk_assessment: High likelihood on compromised endpoints with high exploitation impact.
    false_positives: Placeholder tokens or empty key fields might be misdetected as secrets.
    model_failure_possible_reason: false
    cwe: 312
    risks_identified:
      API key persisted plaintext in local vault settings:
        severity: critical # values: low, medium, elevated, high, critical
        exploitation_likelihood: likely # values: unlikely, likely, very-likely, frequent
        exploitation_impact: high # values: low, medium, high, very-high
        data_breach_probability: probable # values: improbable, possible, probable
        data_breach_technical_assets: # list of technical asset IDs which might have data breach
          - obsidian-vault-storage
          - obsidian-plugin-runtime
        most_relevant_data_asset: elevenlabs-api-key
        most_relevant_technical_asset: obsidian-vault-storage
        most_relevant_communication_link:
        most_relevant_trust_boundary: local-user-workstation
        most_relevant_shared_runtime:

  T3 Audio Output Path Traversal:
    id: t3-audio-output-path-traversal
    description: Unsanitized output paths can allow traversal beyond intended vault location.
    impact: Overwrite or create arbitrary files in the vault and potentially in adjacent filesystem paths.
    asvs: V5 - Validation, Sanitization and Encoding
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Input_Validation_Cheat_Sheet.html
    action: Canonicalize and validate output paths against vault root before write operations.
    mitigation: Enforce normalized allowlisted path segments and reject traversal patterns (`..`, absolute paths, mixed separators).
    check: Unit and integration tests prove writes are constrained to vault root on all supported platforms.
    function: development # values: business-side, architecture, development, operations
    stride: tampering # values: spoofing, tampering, repudiation, information-disclosure, denial-of-service, elevation-of-privilege
    detection_logic: Fuzz output path inputs with traversal payloads and assert blocked writes.
    risk_assessment: Likelihood depends on attacker control over filename/path inputs; impact is high when writes are unconstrained.
    false_positives: Legitimate nested relative paths inside the vault can resemble traversal attempts.
    model_failure_possible_reason: false
    cwe: 22
    risks_identified:
      Potential traversal in mp3 vault write path:
        severity: high # values: low, medium, elevated, high, critical
        exploitation_likelihood: likely # values: unlikely, likely, very-likely, frequent
        exploitation_impact: high # values: low, medium, high, very-high
        data_breach_probability: possible # values: improbable, possible, probable
        data_breach_technical_assets: # list of technical asset IDs which might have data breach
          - obsidian-plugin-runtime
          - obsidian-vault-storage
        most_relevant_data_asset: generated-audio-files
        most_relevant_technical_asset: obsidian-plugin-runtime
        most_relevant_communication_link:
        most_relevant_trust_boundary: local-user-workstation
        most_relevant_shared_runtime:

  T8 API Key Leakage in Logs:
    id: t8-api-key-logging-leak
    description: API key or sensitive authorization metadata might be emitted into plugin logs/console.
    impact: Secrets become retrievable by local users, malware, debugging collectors, or log forwarding sinks.
    asvs: V9 - Communications
    cheat_sheet: https://cheatsheetseries.owasp.org/cheatsheets/Logging_Cheat_Sheet.html
    action: Redact secrets and prohibit logging of authorization headers and raw config blobs.
    mitigation: Centralized logger with redaction patterns and secure debug-mode gating.
    check: Automated tests assert log output never contains key patterns or auth header values.
    function: development # values: business-side, architecture, development, operations
    stride: information-disclosure # values: spoofing, tampering, repudiation, information-disclosure, denial-of-service, elevation-of-privilege
    detection_logic: Static and runtime checks for logging sinks containing `apiKey`, `Authorization`, or known token formats.
    risk_assessment: Common during troubleshooting paths; impact remains high if secrets are exposed.
    false_positives: Masked or synthetic test keys may trigger simple detectors.
    model_failure_possible_reason: false
    cwe: 532
    risks_identified:
      Sensitive auth material written to plugin logs:
        severity: high # values: low, medium, elevated, high, critical
        exploitation_likelihood: likely # values: unlikely, likely, very-likely, frequent
        exploitation_impact: high # values: low, medium, high, very-high
        data_breach_probability: probable # values: improbable, possible, probable
        data_breach_technical_assets: # list of technical asset IDs which might have data breach
          - obsidian-plugin-runtime
          - obsidian-vault-storage
        most_relevant_data_asset: elevenlabs-api-key
        most_relevant_technical_asset: obsidian-plugin-runtime
        most_relevant_communication_link:
        most_relevant_trust_boundary: local-user-workstation
        most_relevant_shared_runtime:

